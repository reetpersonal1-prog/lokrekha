<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact | LOKREKHA</title>

<style>
body {
  font-family: Georgia, serif;
  background: #EBBE9B;
  color: #502419;
  margin: 0;
}

header {
  background: #502419;
  padding: 15px 40px;
}

header h1 {
  color: #E7A977;
}

section {
  padding: 60px 20px;
  text-align: center;
}

form {
  max-width: 500px;
  margin: auto;
  display: flex;
  flex-direction: column;
  gap: 15px;
}

input, textarea {
  padding: 10px;
  border: none;
  border-radius: 5px;
}

button {
  background: #7EA172;
  color: #502419;
  padding: 10px;
  border: none;
  cursor: pointer;
}
</style>
</head>

<body>

<header>
  <h1>LOKREKHA</h1>
</header>

<section>
  <h2>Contact Us</h2>

  <form>
    <input type="text" placeholder="Your Name" required>
    <input type="email" placeholder="Your Email" required>
    <textarea placeholder="Your Message" required></textarea>
    <button type="submit">Send Message</button>
  </form>

</section>

</body>
</html>
