<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact | LOKREKHA</title>

<link rel="icon" href="f2bfc1cb-bc02-426e-bb88-4d5e946893fd.png">

<style>

/* RESET */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

/* BODY */
body {
  font-family: 'Georgia', serif;
  background: #EBBE9B;
  color: #502419;
}

/* HEADER */
header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 15px 40px;
  background: #502419;
}

/* LOGO */
.logo {
  display: flex;
  align-items: center;
  gap: 12px;
}

.logo img {
  height: 60px;
  border-radius: 50%;
}

.logo h1 {
  color: #E7A977;
  font-size: 22px;
}

/* NAV */
nav {
  display: flex;
  gap: 25px;
}

nav a {
  text-decoration: none;
  color: #EBBE9B;
  transition: 0.3s;
}

nav a:hover {
  color: #E7A977;
}

/* CONTACT SECTION */
.contact {
  padding: 80px 20px;
  text-align: center;
}

.contact h2 {
  margin-bottom: 20px;
}

/* FORM */
form {
  max-width: 500px;
  margin: auto;
  display: flex;
  flex-direction: column;
  gap: 15px;
}

input, textarea {
  padding: 12px;
  border: none;
  border-radius: 5px;
}

button {
  background: #7EA172;
  color: #502419;
  padding: 12px;
  border: none;
  font-weight: bold;
  cursor: pointer;
}

button:hover {
  background: #E7A977;
}

/* INSTAGRAM */
.instagram {
  margin-top: 30px;
}

.instagram a {
  display: inline-block;
  margin-top: 10px;
  padding: 10px 20px;
  background: #E7A977;
  color: #502419;
  text-decoration: none;
  border-radius: 5px;
  font-weight: bold;
}

.instagram a:hover {
  background: #7EA172;
}

/* FOOTER */
footer {
  background: #502419;
  color: #EBBE9B;
  text-align: center;
  padding: 20px;
  margin-top: 40px;
}

</style>
</head>

<body>

<!-- HEADER -->
<header>
  <div class="logo">
    <img src="f2bfc1cb-bc02-426e-bb88-4d5e946893fd.png" alt="Logo">
    <h1>LOKREKHA</h1>
  </div>

  <nav>
    <a href="index.html">Home</a>
    <a href="#">Collections</a>
    <a href="#">About</a>
    <a href="contact.html">Contact</a>
  </nav>
</header>

<!-- CONTACT -->
<section class="contact">

  <h2>Contact Us</h2>

  <form>
    <input type="text" placeholder="Your Name" required>
    <input type="email" placeholder="Your Email" required>
    <textarea placeholder="Your Message" required></textarea>
    <button type="submit">Send Message</button>
  </form>

  <!-- INSTAGRAM -->
  <div class="instagram">
    <p>Follow us on Instagram</p>
    <a href="https://instagram.com/lokrekha.in" target="_blank">
      @lokrekha.in
    </a>
  </div>

</section>

<!-- FOOTER -->
<footer>
  <p>© 2026 LOKREKHA | Crafted with Tradition</p>
</footer>

</body>
</html>
